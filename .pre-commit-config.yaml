repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  # Use system ansible-lint instead of pre-commit's isolated env
  # This ensures ansible-lint has access to the ansible package installed in the container
  - repo: local
    hooks:
      - id: ansible-lint
        name: Ansible-lint
        language: system
        entry: ansible-lint
        files: \.(yaml|yml)$
        pass_filenames: false
